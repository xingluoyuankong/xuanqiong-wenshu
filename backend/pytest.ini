[pytest]
testpaths = app/services
python_files = test_*.py *_test.py
norecursedirs = .git .venv venv node_modules dist build __pycache__
addopts = -ra --ignore=test_bigmodel.py --ignore=test_all_models.py --ignore=test_free_models.py --ignore=test_model_iq.py --ignore=test_models_parallel.py --ignore=test_ollama_quality.py
